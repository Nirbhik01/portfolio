name: Deploy to GitHub Pages

# Build and publish the site whenever main is updated.
on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so the baked GitHub activity heatmap stays current.
  schedule:
    - cron: '17 6 * * *'

# Least-privilege tokens required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate the deploy on the full test suite — never ship a red build.
      - name: Test
        run: npm test

      # Enables Pages on the repo (source = GitHub Actions) on first run, so no
      # manual Settings → Pages step is required.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Bake the latest GitHub contribution data into the build. Fails safe:
      # if the fetch errors, the committed fallback data is used instead.
      - name: Fetch GitHub activity
        run: node scripts/fetch-github-activity.mjs
        env:
          GITHUB_ACTIVITY_LOGIN: Nirbhik01
          # Uses the built-in token by default; if GitHub restricts the
          # contributions query, add a read-only PAT as the ACTIVITY_TOKEN secret.
          GH_TOKEN: ${{ secrets.ACTIVITY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
